name: Promote to PyPI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to promote (e.g. v0.3.2). Artifacts are pulled from the GitHub Release for this tag."
        required: true
        type: string

permissions:
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download dist artifacts from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${{ inputs.tag }}" \
            --repo "${{ github.repository }}" \
            --dir dist \
            --pattern '*.whl' \
            --pattern '*.tar.gz'
          ls -la dist/

      - name: Verify checksums against release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ inputs.tag }}" \
            --repo "${{ github.repository }}" \
            --dir dist \
            --pattern 'SHA256SUMS.txt'
          cd dist
          sha256sum -c SHA256SUMS.txt
          rm SHA256SUMS.txt

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
