name: Build Binaries

on:
  workflow_dispatch:
  workflow_call:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
            python-version: "3.11"
          - os: ubuntu-latest
            platform: linux-x64
            python-version: "3.11"
          - os: windows-latest
            platform: windows-x64
            python-version: "3.11"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --all-packages --all-extras
          uv pip install pyinstaller

      - name: Inject telemetry key (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          TELEMETRY_INGEST_KEY: ${{ secrets.TELEMETRY_INGEST_KEY }}
        run: |
          if [ -n "$TELEMETRY_INGEST_KEY" ]; then
            sed -i.bak "s/__TELEMETRY_INGEST_KEY__/${TELEMETRY_INGEST_KEY}/g" \
              packages/ai-finder/src/ai_finder_cli/telemetry.py
            rm -f packages/ai-finder/src/ai_finder_cli/telemetry.py.bak
            echo "Telemetry key injected"
          else
            echo "No telemetry key configured, skipping"
          fi

      - name: Inject telemetry key (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TELEMETRY_INGEST_KEY: ${{ secrets.TELEMETRY_INGEST_KEY }}
        run: |
          if ($env:TELEMETRY_INGEST_KEY) {
            $file = "packages/ai-finder/src/ai_finder_cli/telemetry.py"
            (Get-Content $file) -replace '__TELEMETRY_INGEST_KEY__', $env:TELEMETRY_INGEST_KEY | Set-Content $file
            Write-Host "Telemetry key injected"
          } else {
            Write-Host "No telemetry key configured, skipping"
          }

      - name: Build binary
        run: |
          uv run pyinstaller ai-finder.spec --clean

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mv dist/ai-finder dist/ai-finder-${{ matrix.platform }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          move dist\ai-finder.exe dist\ai-finder-${{ matrix.platform }}.exe

      - name: Test binary (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x dist/ai-finder-${{ matrix.platform }}
          ./dist/ai-finder-${{ matrix.platform }} --version
          ./dist/ai-finder-${{ matrix.platform }} --help

      - name: Test binary (Windows)
        if: runner.os == 'Windows'
        run: |
          .\dist\ai-finder-${{ matrix.platform }}.exe --version
          .\dist\ai-finder-${{ matrix.platform }}.exe --help
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ai-finder-${{ matrix.platform }}
          path: dist/ai-finder-${{ matrix.platform }}*
          if-no-files-found: error

  release:
    needs: build
    if: always() && startsWith(github.ref, 'refs/tags/v') && (needs.build.result == 'success' || needs.build.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: binaries
          pattern: ai-finder-*
          merge-multiple: true

      - name: Create checksums
        run: |
          cd binaries
          sha256sum * > SHA256SUMS-binaries.txt
          cat SHA256SUMS-binaries.txt

      - name: Upload binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            binaries/*
          prerelease: ${{ contains(github.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
