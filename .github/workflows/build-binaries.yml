name: Build Binaries

on:
  workflow_dispatch:
  workflow_call:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
            python-version: "3.11"
          - os: ubuntu-latest
            platform: linux-x64
            python-version: "3.11"
          - os: windows-latest
            platform: windows-x64
            python-version: "3.11"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --all-packages
          uv pip install pyinstaller

      - name: Build binary
        run: |
          uv run pyinstaller scanoss-ai.spec --clean

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mv dist/scanoss-ai dist/scanoss-ai-${{ matrix.platform }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          move dist\scanoss-ai.exe dist\scanoss-ai-${{ matrix.platform }}.exe

      - name: Test binary (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x dist/scanoss-ai-${{ matrix.platform }}
          ./dist/scanoss-ai-${{ matrix.platform }} --version
          ./dist/scanoss-ai-${{ matrix.platform }} --help

      - name: Test binary (Windows)
        if: runner.os == 'Windows'
        run: |
          .\dist\scanoss-ai-${{ matrix.platform }}.exe --version
          .\dist\scanoss-ai-${{ matrix.platform }}.exe --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scanoss-ai-${{ matrix.platform }}
          path: dist/scanoss-ai-${{ matrix.platform }}*
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          pattern: scanoss-ai-*
          merge-multiple: true

      - name: Create checksums
        run: |
          cd binaries
          sha256sum * > SHA256SUMS-binaries.txt
          cat SHA256SUMS-binaries.txt

      - name: Upload binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            binaries/*
          prerelease: ${{ contains(github.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
