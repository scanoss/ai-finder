[project]
name = "scanoss-ai-workspace"
version = "0.0.0"
description = "SCANOSS AI - AI artifact scanner workspace"
requires-python = ">=3.8"

[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
scanoss-ai-kb = { workspace = true }
scanoss-ai-scanner = { workspace = true }
scanoss-ai = { workspace = true }

[tool.ruff]
line-length = 100
target-version = "py38"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.8"
strict = true
warn_return_any = true
warn_unused_ignores = true

[tool.pytest.ini_options]
testpaths = [
    "packages/scanoss-ai-kb/tests",
    "packages/scanoss-ai-scanner/tests",
    "packages/scanoss-ai/tests",
]
addopts = "-v --tb=short --cov-report=term-missing"
