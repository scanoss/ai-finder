[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "scanoss-ai"
version = "0.2.4"
description = "SCANOSS AI - AI artifact scanner for supply chain security"
license = {text = "Apache-2.0"}
readme = "README.md"
requires-python = ">=3.8"
authors = [{name = "SCANOSS", email = "info@scanoss.com"}]
keywords = ["ai", "sbom", "scanner", "supply-chain", "compliance", "scanoss"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "scanoss-ai-scanner",
    "scanoss-ai-kb",
    "click>=8.0",
]

# ptelemetry for anonymous usage telemetry
# Install from PyPI when available, or from local build:
#   pip install ptelemetry
# Telemetry is optional - CLI works without it (silently disabled)

[project.scripts]
scanoss-ai = "scanoss_ai_cli.main:main"

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[project.urls]
Homepage = "https://scanoss.com"
Repository = "https://github.com/scanoss/scanoss-ai"

[tool.hatch.build.targets.wheel]
packages = ["src/scanoss_ai_cli"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
