[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ai-finder-scanner"
version = "0.2.11"
description = "AI Finder Scanner library"
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.9"
authors = [{name = "SCANOSS", email = "info@scanoss.com"}]
keywords = ["ai", "sbom", "scanner", "tree-sitter"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "ai-finder-kb",
    "pyyaml>=6.0",
    "tomli>=2.0;python_version<'3.11'",
    "tqdm>=4.65",
    "python-tlsh>=4.5.0",
    "requests>=2.28",
    "python-levenshtein>=0.25.1",
]

[project.optional-dependencies]
# Relationship analysis requires tree-sitter (Python 3.10+ only)
relationships = [
    "tree-sitter>=0.22;python_version>='3.10'",
    "tree-sitter-python>=0.21;python_version>='3.10'",
    "tree-sitter-javascript>=0.21;python_version>='3.10'",
    "tree-sitter-typescript>=0.21;python_version>='3.10'",
    "tree-sitter-ruby>=0.21;python_version>='3.10'",
    "tree-sitter-php>=0.22;python_version>='3.10'",
    "tree-sitter-c-sharp>=0.21;python_version>='3.10'",
    "tree-sitter-go>=0.21;python_version>='3.10'",
    "tree-sitter-rust>=0.21;python_version>='3.10'",
    "tree-sitter-java>=0.21;python_version>='3.10'",
    "tree-sitter-cpp>=0.21;python_version>='3.10'",
]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "pytest-mock>=3.10",
]

[tool.hatch.build.targets.wheel]
packages = ["src/ai_finder_scanner"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
