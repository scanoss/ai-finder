[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ai-finder"
version = "0.3.7"
description = "AI Finder - AI artifact scanner for supply chain security"
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.9"
authors = [{name = "SCANOSS", email = "info@scanoss.com"}]
keywords = ["ai", "sbom", "scanner", "supply-chain", "compliance"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "click>=8.0",
    "pyyaml>=6.0",
    "tomli>=2.0;python_version<'3.11'",
    "tqdm>=4.65",
    "requests>=2.28",
    "python-levenshtein>=0.25.1",
    "osslili>=1.6",
    "ptelemetry>=0.2.2",
]

[project.scripts]
ai-finder = "ai_finder_cli.main:main"

[project.optional-dependencies]
# TLSH fuzzy hashing requires a C compiler on some platforms (e.g. Windows without build tools)
fuzzy = [
    "python-tlsh>=4.5.0",
]
# Relationship analysis requires tree-sitter (Python 3.10+ only)
relationships = [
    "tree-sitter>=0.22;python_version>='3.10'",
    "tree-sitter-python>=0.21;python_version>='3.10'",
    "tree-sitter-javascript>=0.21;python_version>='3.10'",
    "tree-sitter-typescript>=0.21;python_version>='3.10'",
    "tree-sitter-ruby>=0.21;python_version>='3.10'",
    "tree-sitter-php>=0.22;python_version>='3.10'",
    "tree-sitter-c-sharp>=0.21;python_version>='3.10'",
    "tree-sitter-go>=0.21;python_version>='3.10'",
    "tree-sitter-rust>=0.21;python_version>='3.10'",
    "tree-sitter-java>=0.21;python_version>='3.10'",
    "tree-sitter-cpp>=0.21;python_version>='3.10'",
]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "pytest-mock>=3.10",
]

[project.urls]
Homepage = "https://scanoss.com"
Repository = "https://github.com/scanoss/ai-finder"

[tool.hatch.build.targets.wheel]
packages = [
    "src/ai_finder_cli",
    "src/ai_finder_kb",
    "src/ai_finder_scanner",
]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
