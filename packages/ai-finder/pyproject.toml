[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ai-finder"
version = "0.3.2"
description = "AI Finder - AI artifact scanner for supply chain security"
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.9"
authors = [{name = "SCANOSS", email = "info@scanoss.com"}]
keywords = ["ai", "sbom", "scanner", "supply-chain", "compliance"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "ai-finder-scanner",
    "ai-finder-kb",
    "click>=8.0",
]

# ptelemetry for anonymous usage telemetry
# Install from PyPI when available, or from local build:
#   pip install ptelemetry
# Telemetry is optional - CLI works without it (silently disabled)

[project.scripts]
ai-finder = "ai_finder_cli.main:main"

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[project.urls]
Homepage = "https://scanoss.com"
Repository = "https://github.com/scanoss/ai-finder"

[tool.hatch.build.targets.wheel]
packages = ["src/ai_finder_cli"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
