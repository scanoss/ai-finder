[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ai-finder-kb"
version = "0.2.11"
description = "AI Finder Knowledge Base library"
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.8"
authors = [{name = "SCANOSS", email = "info@scanoss.com"}]
keywords = ["ai", "sbom", "knowledge-base"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    # osslili uses Python 3.9+ type annotations at runtime
    "osslili>=1.6;python_version>='3.9'",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/ai_finder_kb"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""

[tool.hatch.build.targets.wheel.force-include]
"src/ai_finder_kb/data" = "ai_finder_kb/data"
